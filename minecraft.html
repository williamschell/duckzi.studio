<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minecraft — Duckzi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #f5f3ef;
      color: #2d2a35;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .blob { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.4; pointer-events: none; z-index: 0; }
    .blob-1 { width: 420px; height: 420px; background: #d4cef5; top: -100px; right: -80px; }
    .blob-2 { width: 340px; height: 340px; background: #f5dfc8; bottom: 60px; left: -80px; }
    .blob-3 { width: 260px; height: 260px; background: #c9e8d8; top: 40%; left: 35%; }

    /* ── NAV ── */
    nav {
      background: rgba(250,248,244,0.88);
      backdrop-filter: blur(14px);
      padding: 0 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      border-bottom: 1px solid rgba(0,0,0,0.07);
      position: sticky;
      top: 0;
      z-index: 100;
      height: 68px;
    }

    .nav-links { display: flex; gap: 0.25rem; list-style: none; align-items: center; }
    .nav-links li { position: relative; }

    .nav-links a, .nav-btn {
      color: #1f1f1f;
      text-decoration: none;
      font-size: 1rem;
      padding: 0.5rem 0.9rem;
      border-radius: 999px;
      transition: color 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
    }
    .nav-links a:hover, .nav-btn:hover { color: #7b6aaa; }
    .nav-links a.active { color: #7b6aaa; }

    .arrow { font-size: 0.55rem; opacity: 0.5; transition: transform 0.2s; }
    .nav-links li:hover .arrow { transform: rotate(180deg); }

    .dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 0.4rem);
      left: 0;
      background: #fefcfa;
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 14px;
      padding: 0.4rem;
      min-width: 180px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.1);
      z-index: 200;
    }
    .nav-links li:hover .dropdown { display: block; }

    .dropdown a {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.65rem 0.8rem; border-radius: 8px;
      color: #1f1f1f; font-size: 0.9rem; font-weight: 600;
      text-decoration: none; transition: color 0.15s;
    }
    .dropdown a:hover { color: #7b6aaa; }

    .icon { width: 26px; height: 26px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; font-weight: 700; }
    .icon-games { background: #ddeefa; color: #3a7abf; }

    .nav-socials { display: flex; gap: 1.25rem; align-items: center; }
    .nav-socials a { font-size: 1.2rem; color: #1f1f1f; text-decoration: none; transition: color 0.2s; }
    .nav-socials a:hover { color: #7b6aaa; }

    /* ── PAGE HEADER ── */
    .page-header {
      max-width: 960px;
      margin: auto;
      padding: 3.5rem 2.5rem 2.5rem;
      position: relative;
      z-index: 1;
    }

    .page-eyebrow {
      font-size: 0.7rem;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: #c0baca;
      margin-bottom: 0.6rem;
    }

    .page-header h1 {
      font-family: 'Lora', serif;
      font-size: clamp(1.9rem, 4vw, 2.8rem);
      font-weight: 600;
      color: #2d2a35;
      letter-spacing: -0.5px;
      margin-bottom: 0.5rem;
    }

    .page-header h1 .accent { color: #7b6aaa; font-style: italic; }

    .page-header p {
      font-size: 0.92rem;
      color: #8a849c;
      line-height: 1.75;
      max-width: 520px;
    }

    /* ── GRID ── */
    .content-section {
      max-width: 960px;
      margin: auto;
      padding: 0 2.5rem 5rem;
      position: relative;
      z-index: 1;
    }

    .post-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.1rem;
    }

    @media (max-width: 700px)  { .post-grid { grid-template-columns: 1fr; } }
    @media (min-width: 701px) and (max-width: 960px) { .post-grid { grid-template-columns: repeat(2, 1fr); } }

    .post-card {
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(0,0,0,0.07);
      border-radius: 18px;
      overflow: hidden;
      backdrop-filter: blur(6px);
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      transition: box-shadow 0.25s, transform 0.25s;
    }

    .post-card:hover {
      box-shadow: 0 8px 28px rgba(100,80,160,0.13);
      transform: translateY(-3px);
    }

    .post-img {
      width: 100%;
      aspect-ratio: 16/9;
      background: linear-gradient(135deg, #d8f0e4, #c9e8d8);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      overflow: hidden;
      position: relative;
    }

    .post-img img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; }

    .post-body { padding: 1.1rem 1.2rem 1.3rem; display: flex; flex-direction: column; flex: 1; }

    .post-meta { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.55rem; }

    .type-badge {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      background: #d8f0e4;
      color: #2a8a50;
    }

    .post-date { font-size: 0.7rem; color: #bab4cc; margin-left: auto; }

    .post-body h3 {
      font-family: 'Lora', serif;
      font-size: 0.97rem;
      font-weight: 600;
      color: #2d2a35;
      margin-bottom: 0.3rem;
      line-height: 1.35;
    }

    .post-body .post-sub {
      font-size: 0.78rem;
      color: #9e98b2;
      line-height: 1.5;
      font-style: italic;
    }

    .empty-msg {
      color: #bab4cc;
      font-size: 0.9rem;
      padding: 3rem 0;
      text-align: center;
      grid-column: 1 / -1;
    }

    .loading-msg { color: #bab4cc; font-size: 0.88rem; padding: 1rem 0; }

    footer {
      padding: 2rem 2.5rem;
      text-align: center;
      font-size: 0.78rem;
      color: #b8b2c8;
      border-top: 1px solid rgba(0,0,0,0.06);
      position: relative;
      z-index: 1;
    }
  </style>
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <!-- NAV -->
  <nav>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li>
        <button class="nav-btn">Games <span class="arrow">▼</span></button>
        <div class="dropdown">
          <a href="mira.html"><span class="icon icon-games">M</span>Mira</a>
        </div>
      </li>
      <li><a href="minecraft.html" class="active">Minecraft</a></li>
      <li><a href="art.html">Art</a></li>
      <li><a href="universe.html">Universe</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
    <div class="nav-socials">
      <a href="https://www.instagram.com/william._schell/" title="Instagram"><i class="fa-brands fa-instagram"></i></a>
      <a href="#" title="Reddit"><i class="fa-brands fa-reddit-alien"></i></a>
      <a href="contact.html" title="Contact"><i class="fa-solid fa-envelope"></i></a>
    </div>
  </nav>

  <!-- PAGE HEADER -->
  <div class="page-header">
    <p class="page-eyebrow">Modding & Maps</p>
    <h1>My <span class="accent">Minecraft</span> Work</h1>
    <p>Custom mods, hand-crafted maps, modpacks, and server projects.</p>
  </div>

  <!-- GRID -->
  <section class="content-section">
    <div class="post-grid" id="posts-container">
      <p class="loading-msg">Loading...</p>
    </div>
  </section>

  <footer>&copy; 2025 Duckzi. All rights reserved.</footer>

  <script>
    function fmtDate(d) {
      return new Date(d + 'T00:00:00').toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' });
    }

    fetch('posts.json')
      .then(r => r.json())
      .then(posts => {
        const mc = posts
          .filter(p => (p.tags || []).includes('minecraft'))
          .sort((a, b) => new Date(b.date) - new Date(a.date));

        if (!mc.length) {
          document.getElementById('posts-container').innerHTML =
            '<p class="empty-msg">Nothing here yet — check back soon!</p>';
          return;
        }

        document.getElementById('posts-container').innerHTML = mc.map(p => {
          const imgHtml = p.image
            ? `<img src="${p.image}" alt="${p.title}" onerror="this.style.display='none'">`
            : '⛏️';

          return `
            <a class="post-card" href="post.html?id=${p.id}">
              <div class="post-img">${imgHtml}</div>
              <div class="post-body">
                <div class="post-meta">
                  <span class="type-badge">Minecraft</span>
                  <span class="post-date">${fmtDate(p.date)}</span>
                </div>
                <h3>${p.title}</h3>
                ${p.subtitle ? `<p class="post-sub">${p.subtitle}</p>` : ''}
              </div>
            </a>`;
        }).join('');
      })
      .catch(() => {
        document.getElementById('posts-container').innerHTML =
          '<p class="loading-msg">Could not load posts.</p>';
      });
  </script>
</body>
</html>
